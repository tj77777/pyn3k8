apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: ui-pdb
  namespace: pyn3k8
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app: ui
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: api-pdb
  namespace: pyn3k8
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app: api
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: worker-pdb
  namespace: pyn3k8
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app: worker
