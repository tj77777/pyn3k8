apiVersion: v1
kind: Service
metadata:
  name: ui-service
  namespace: {{ .Values.namespace }}
  labels:
    app: ui
    {{- include "pyn3k8.labels" . | nindent 4 }}
spec:
  type: ClusterIP
  selector:
    app: ui
  ports:
    - port: {{ .Values.ui.port }}
      targetPort: {{ .Values.ui.port }}
      protocol: TCP
