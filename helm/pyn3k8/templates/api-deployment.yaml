apiVersion: apps/v1
kind: Deployment
metadata:
  name: api
  namespace: {{ .Values.namespace }}
  labels:
    app: api
    {{- include "pyn3k8.labels" . | nindent 4 }}
spec:
  {{- if not .Values.api.hpa.enabled }}
  replicas: {{ .Values.api.replicaCount }}
  {{- end }}
  strategy:
    type: {{ .Values.api.strategy.type }}
    rollingUpdate:
      maxSurge: {{ .Values.api.strategy.rollingUpdate.maxSurge }}
      maxUnavailable: {{ .Values.api.strategy.rollingUpdate.maxUnavailable }}
  selector:
    matchLabels:
      app: api
  template:
    metadata:
      labels:
        app: api
        version: {{ .Values.api.image.tag | quote }}
    spec:
      automountServiceAccountToken: false
      securityContext:
        {{- include "pyn3k8.podSecurityContext" . | nindent 8 }}
      containers:
        - name: api
          image: "{{ .Values.api.image.repository }}:{{ .Values.api.image.tag }}"
          imagePullPolicy: {{ .Values.global.imagePullPolicy }}
          ports:
            - containerPort: {{ .Values.api.port }}
              protocol: TCP
          envFrom:
            - configMapRef:
                name: app-config
            - secretRef:
                name: app-secrets
          resources:
            {{- toYaml .Values.api.resources | nindent 12 }}
          securityContext:
            {{- include "pyn3k8.containerSecurityContext" . | nindent 12 }}
          livenessProbe:
            httpGet:
              path: /healthz
              port: {{ .Values.api.port }}
            initialDelaySeconds: 5
            periodSeconds: 10
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /readyz
              port: {{ .Values.api.port }}
            initialDelaySeconds: 3
            periodSeconds: 5
            failureThreshold: 3
          startupProbe:
            httpGet:
              path: /healthz
              port: {{ .Values.api.port }}
            initialDelaySeconds: 2
            periodSeconds: 3
            failureThreshold: 10
          volumeMounts:
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: tmp
          emptyDir: {}
