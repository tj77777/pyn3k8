apiVersion: apps/v1
kind: Deployment
metadata:
  name: ui
  namespace: {{ .Values.namespace }}
  labels:
    app: ui
    {{- include "pyn3k8.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.ui.replicaCount }}
  strategy:
    type: {{ .Values.ui.strategy.type }}
    rollingUpdate:
      maxSurge: {{ .Values.ui.strategy.rollingUpdate.maxSurge }}
      maxUnavailable: {{ .Values.ui.strategy.rollingUpdate.maxUnavailable }}
  selector:
    matchLabels:
      app: ui
  template:
    metadata:
      labels:
        app: ui
        version: {{ .Values.ui.image.tag | quote }}
    spec:
      automountServiceAccountToken: false
      securityContext:
        {{- include "pyn3k8.podSecurityContext" . | nindent 8 }}
      containers:
        - name: ui
          image: "{{ .Values.ui.image.repository }}:{{ .Values.ui.image.tag }}"
          imagePullPolicy: {{ .Values.global.imagePullPolicy }}
          ports:
            - containerPort: {{ .Values.ui.port }}
              protocol: TCP
          envFrom:
            - configMapRef:
                name: app-config
            - secretRef:
                name: app-secrets
          resources:
            {{- toYaml .Values.ui.resources | nindent 12 }}
          securityContext:
            {{- include "pyn3k8.containerSecurityContext" . | nindent 12 }}
          livenessProbe:
            httpGet:
              path: /healthz
              port: {{ .Values.ui.port }}
            initialDelaySeconds: 5
            periodSeconds: 10
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /readyz
              port: {{ .Values.ui.port }}
            initialDelaySeconds: 3
            periodSeconds: 5
            failureThreshold: 3
          startupProbe:
            httpGet:
              path: /healthz
              port: {{ .Values.ui.port }}
            initialDelaySeconds: 2
            periodSeconds: 3
            failureThreshold: 10
          volumeMounts:
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: tmp
          emptyDir: {}
