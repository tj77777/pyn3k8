apiVersion: v1
kind: Service
metadata:
  name: api-service
  namespace: {{ .Values.namespace }}
  labels:
    app: api
    {{- include "pyn3k8.labels" . | nindent 4 }}
spec:
  type: ClusterIP
  selector:
    app: api
  ports:
    - port: {{ .Values.api.port }}
      targetPort: {{ .Values.api.port }}
      protocol: TCP
